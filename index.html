<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WMS · 世界电影大赏</title>
<style>
:root{
  --panel-bg:#FFEFD7;        /* 左栏背景 */
  --wall-bg:#FFF5E7;         /* 海报墙背景 */
  --logo:#3B2600;            /* logo / 标题后半 */
  --line-strong:#000000;     /* 左右分割线 / logo下线 / 筛选器边框文字 */
  --ink:#000000;             /* 筛选器内 & 片名 */
  --yearbar-base:#DBCFBC;    /* 年份bar底线 / 海报分割线 */
  --grid-line:#DBCFBC;
  --title-front:#FF6F2E;     /* 海报墙标题前半 */
  --meta:#C2B5A1;            /* 年份+导演 */
  --tag-oscar:#AB8C73;
  --tag-cannes:#79AB73;
  --tag-goldenhorse:#7395AB;
  --heart:#FF0000;
  --disabled:#B3A892;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--wall-bg);color:var(--ink);
  font-family:"PingFang SC","Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.app{display:flex;min-height:100vh;}

/* ============ 左栏筛选器 ============ */
.panel{width:380px;flex-shrink:0;background:var(--panel-bg);
  border-right:1px solid var(--line-strong);position:sticky;top:0;height:100vh;overflow-y:auto;}
.panel-inner{padding:0;}
/* logo 区：上左边距32，下方横线距logo 32 */
.logo-wrap{padding:32px 0 32px 32px;border-bottom:1px solid var(--line-strong);}
.logo-wrap svg{height:76px;width:auto;display:block;}

/* ---- 手风琴 ---- */
.sec.acc{padding:0 32px;}
.acc-head{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
  padding:28px 0 0;}
.acc-head .ico{width:22px;height:22px;flex-shrink:0;color:var(--ink);display:block;}
.acc-head .ico svg{width:100%;height:100%;display:block;}
.sec-title{font-size:18px;font-weight:600;color:var(--ink);letter-spacing:.01em;}
.chev{width:14px;height:9px;margin-left:4px;flex-shrink:0;
  background:var(--ink);
  -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 98 56'><path d='M93.5 52L48.5 7L3.5 52' fill='none' stroke='black' stroke-width='10'/></svg>") center/contain no-repeat;
          mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 98 56'><path d='M93.5 52L48.5 7L3.5 52' fill='none' stroke='black' stroke-width='10'/></svg>") center/contain no-repeat;
  transition:transform .2s;}
.sec.acc:not(.open) .chev{transform:rotate(180deg);}   /* 收起：朝下 */
.acc-body{overflow:hidden;padding-top:20px;padding-bottom:8px;}
.sec.acc:not(.open) .acc-body{display:none;}
.sec.acc.open + .sec.acc .acc-head,
.sec.acc .acc-head{}

/* 红心入口(无子项)选中态：标题前半色高亮 */
.sec.acc.entry.sel .sec-title{color:var(--title-front);}
.sec.acc.entry.sel .ico{color:var(--title-front);}

.sub-label{font-size:14px;color:var(--ink);margin:20px 0 8px;}
.sub-label:first-of-type{margin-top:0;}

/* tag 网格：两列，gap16 */
.tag-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
.tag{height:36px;border:1px solid var(--ink);background:transparent;color:var(--ink);
  font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:0 6px;transition:background .12s,color .12s;line-height:1.2;white-space:nowrap;}
.tag:hover:not(.on){background:rgba(0,0,0,.05);}
.tag.on{background:var(--ink);color:var(--panel-bg);}       /* 选中：黑底+背景色字 */

/* 红心区提示 */
.fav-hint{font-size:13px;color:var(--meta);line-height:1.6;}

/* 年份滑块：自适应左栏内容宽（与两列tag对齐），不再写死像素 */
.year-block{margin-bottom:4px;}
.year-val{font-size:14px;color:var(--ink);margin-bottom:10px;font-variant-numeric:tabular-nums;}
.slider{position:relative;width:100%;height:18px;margin:0 9px;width:calc(100% - 18px);}
.slider .track-base{position:absolute;top:50%;left:0;right:0;height:1.5px;background:var(--yearbar-base);transform:translateY(-50%);}
.slider .track-fill{position:absolute;top:50%;height:3px;background:var(--ink);transform:translateY(-50%);}
.slider .handle{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;
  background:var(--ink);border:1.5px solid var(--panel-bg);transform:translate(-50%,-50%);cursor:pointer;z-index:2;}
.year-block.disabled{opacity:.4;pointer-events:none;}

/* ============ 右侧海报墙 ============ */
.browse{flex:1;min-width:0;background:var(--wall-bg);}
/* 顶部：海报墙顶与logo下线对齐 → 高度与logo区等高(32+76+32=140)。标题垂直居中，去掉下方横线 */
.wall-head{padding:0 44px;}
.wall-head-inner{display:flex;align-items:center;
  height:140px;}
.wall-title-wrap{display:flex;flex-direction:column;gap:8px;}
.wall-title{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:700;font-size:34px;line-height:1.1;}
.wall-title .front{color:var(--title-front);}
.wall-title .back{color:var(--logo);}
.wall-sub{font-size:16px;color:var(--meta);font-variant-numeric:tabular-nums;}
/* 排序器：在海报上方16px、与海报墙右对齐 */
.sort-row{display:flex;justify-content:flex-end;padding:0 44px;margin-bottom:16px;}
.sorter{display:flex;gap:0;}
.sortbtn{width:77px;height:36px;border:1px solid var(--ink);background:transparent;color:var(--ink);
  font-size:13px;font-family:inherit;cursor:pointer;margin-left:-1px;}
.sortbtn.on{background:var(--ink);color:var(--wall-bg);}

/* 工具组距logo下线40 → 这里指海报网格距标题区。用padding-top实现 */
.grid{display:grid;grid-template-columns:repeat(5,1fr);padding:0 44px 80px;}
/* 海报墙左右无线，仅内部分割线。card 等高(stretch)使行底对齐 */
.card{border-right:1px solid var(--grid-line);border-bottom:1px solid var(--grid-line);
  padding:21px 22px 24px;position:relative;display:flex;flex-direction:column;}
.card:nth-child(5n){border-right:none;}   /* 第5列右侧无线 */
/* 海报框：固定比例(由grid的ratio类决定)，图片contain居中，留白=海报墙底色 */
.poster{position:relative;width:100%;aspect-ratio:2/3;background:var(--wall-bg);
  overflow:hidden;line-height:0;}
.grid.ratio-cc .poster{aspect-ratio:4/5;}     /* 榜单(CC)：4:5 */
.grid.ratio-award .poster{aspect-ratio:2/3;}  /* 奖项：2:3 */
.grid.ratio-fav .poster{aspect-ratio:2/3;}    /* 红心跨池：2:3 */
.poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;display:block;}
/* 红心模式：图片顶边对齐(短海报贴顶、下方留白)，框仍2:3固定→片名/导演保持对齐 */
.grid.ratio-fav .poster img{object-position:top;}
.poster .ph{position:absolute;inset:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--meta);font-size:12px;text-align:center;padding:10px;background:#ece4d4;line-height:1.3;}
/* 红心：21x21，右上角距上右各8。未交互不显示；hover显空心；已收藏显实心 */
.heart{position:absolute;top:8px;right:8px;width:21px;height:21px;cursor:pointer;
  opacity:0;transition:opacity .15s;z-index:2;}
.card:hover .heart{opacity:1;}
.heart.faved{opacity:1;}
.heart svg{width:100%;height:100%;display:block;}

.card-title{font-size:16px;font-weight:500;color:var(--ink);margin-top:12px;line-height:1.3;}
.card-title .yr{color:var(--meta);font-weight:400;font-size:14px;margin-left:6px;}
.card-dir{font-size:14px;font-weight:400;color:var(--meta);margin-top:4px;}
/* A24 票房行 */
.card-box{font-size:14px;font-weight:600;color:var(--title-front);margin-top:6px;font-variant-numeric:tabular-nums;}
/* A24 排名角标(海报左上)，新片(2026新王)标红 */
.rank-badge{position:absolute;top:0;left:0;z-index:3;min-width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;padding:0 8px;
  background:var(--ink);color:var(--panel-bg);font-size:18px;font-weight:700;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;line-height:1;}
.rank-badge.is-new{background:var(--title-front);}   /* 新片橙底 */
/* 奖项小角标：距导演12，角标间4，9号字Bold，1px框，hug pad4 */
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;}
.mini-tag{font-size:9px;font-weight:700;padding:4px;border:1px solid;line-height:1;}
.mini-tag.oscar{color:var(--tag-oscar);border-color:var(--tag-oscar);}
.mini-tag.cannes{color:var(--tag-cannes);border-color:var(--tag-cannes);}
.mini-tag.goldenhorse{color:var(--tag-goldenhorse);border-color:var(--tag-goldenhorse);}

.count-bar{padding:14px 44px 0;font-size:13px;color:var(--meta);}

/* 空状态展位（无数据榜单） */
.empty-stage{grid-column:1 / -1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 44px 120px;gap:24px;}
.empty-card{width:200px;height:248px;border:1.5px dashed var(--yearbar-base);border-radius:4px;
  background:#FBF3E3;display:flex;align-items:center;justify-content:center;}
.empty-ph{width:64px;height:64px;background:var(--yearbar-base);
  -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 4h18v16H3z' fill='none' stroke='black' stroke-width='1.6'/><circle cx='8' cy='9' r='1.8' fill='black'/><path d='M3 17l5-5 4 4 3-3 6 6' fill='none' stroke='black' stroke-width='1.6'/></svg>") center/contain no-repeat;
          mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 4h18v16H3z' fill='none' stroke='black' stroke-width='1.6'/><circle cx='8' cy='9' r='1.8' fill='black'/><path d='M3 17l5-5 4 4 3-3 6 6' fill='none' stroke='black' stroke-width='1.6'/></svg>") center/contain no-repeat;}
.empty-text{font-size:14px;color:var(--meta);}
</style>
</head>
<body>
<div class="app">
  <!-- ============ 左栏 ============ -->
  <aside class="panel">
    <div class="panel-inner">
      <div class="logo-wrap" id="logoWrap"></div>

      <!-- 榜单（默认展开） -->
      <div class="sec acc" id="listSec" data-mod="list">
        <div class="acc-head" data-toggle="list">
          <span class="ico" id="icoRanking"></span><span class="sec-title">榜单</span>
          <span class="chev"></span>
        </div>
        <div class="acc-body">
          <div class="tag-grid">
            <button class="tag" data-list="cc">CC 年度畅销榜</button>
            <button class="tag" data-list="a24">A24 年度票房榜</button>
            <button class="tag" data-list="cahiers" data-empty="1">电影手册年度十佳</button>
            <button class="tag" data-list="sightsound" data-empty="1">视与听年度十佳</button>
          </div>
          <div class="sub-label">媒体</div>
          <div class="tag-grid">
            <button class="tag" data-list="fanpai" data-empty="1">反派影评</button>
            <button class="tag" data-list="xhs" data-empty="1">小红书话题榜</button>
          </div>
        </div>
      </div>

      <!-- 奖项 -->
      <div class="sec acc" id="awardSec" data-mod="award">
        <div class="acc-head" data-toggle="award">
          <span class="ico" id="icoAward"></span><span class="sec-title">奖项</span>
          <span class="chev"></span>
        </div>
        <div class="acc-body">
          <div class="year-block" id="yearBlock">
            <div class="year-val" id="yearVal">2020 – 2025</div>
            <div class="slider" id="slider">
              <div class="track-base"></div>
              <div class="track-fill" id="trackFill"></div>
              <div class="handle" id="hMin"></div>
              <div class="handle" id="hMax"></div>
            </div>
          </div>
          <div class="sub-label">欧美</div>
          <div class="tag-grid">
            <button class="tag" data-aw="cannes">戛纳金棕榈</button>
            <button class="tag" data-aw="oscar">奥斯卡金像</button>
            <button class="tag" data-aw="venice" data-empty="1">威尼斯金狮</button>
            <button class="tag" data-aw="berlin" data-empty="1">柏林金熊</button>
          </div>
          <div class="sub-label">亚洲</div>
          <div class="tag-grid">
            <button class="tag" data-aw="goldenhorse">台北金马</button>
            <button class="tag" data-aw="bluedragon" data-empty="1">韩国青龙奖</button>
          </div>
        </div>
      </div>

      <!-- 红心 -->
      <div class="sec acc entry" id="favSec" data-mod="fav">
        <div class="acc-head" data-select="fav">
          <span class="ico" id="icoHeart"></span><span class="sec-title">红心</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- ============ 海报墙 ============ -->
  <main class="browse">
    <div class="wall-head">
      <div class="wall-head-inner">
        <div class="wall-title-wrap">
          <h1 class="wall-title" id="wallTitle"></h1>
          <div class="wall-sub" id="wallSub"></div>
        </div>
      </div>
    </div>
    <div class="sort-row">
      <div class="sorter">
        <button class="sortbtn on" id="sNew">最新</button>
        <button class="sortbtn" id="sOld">最早</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script src="data/movies.js"></script>
<script src="data/cc_list.js"></script>
<script src="data/a24_list.js"></script>

var AW={oscar:'奥斯卡',cannes:'戛纳',goldenhorse:'金马'};
var AWNAME={oscar:'奥斯卡金像',cannes:'戛纳金棕榈',goldenhorse:'金马最佳'};
var AWKEY={oscar_best_picture:'oscar',cannes_palme_dor:'cannes',golden_horse_best_feature:'goldenhorse'};

/* ===== 奖项库聚合 ===== */
var AWARD_INDEX={};
TWMS_DATA.forEach(function(d){
  var k=AWKEY[d.award_key];
  if(!AWARD_INDEX[d.tmdb_id])AWARD_INDEX[d.tmdb_id]={info:d,awards:[]};
  AWARD_INDEX[d.tmdb_id].awards.push({key:k,type:d.type,year:+d.year});
});
var CN2AWARDS={};
Object.values(AWARD_INDEX).forEach(function(rec){
  var keys=[];rec.awards.forEach(function(a){if(keys.indexOf(a.key)<0)keys.push(a.key);});
  CN2AWARDS[rec.info.title_cn]=keys;
});

/* ===== 年份范围 ===== */
var YEAR_MIN=1927,YEAR_MAX=2025;

/* ===== 状态 ===== */
var state={
  mode:'list',                        // 当前选中内容(全局唯一)：list/award/fav
  open:{list:true, award:false},      // 展开状态(可多开,独立于mode)；红心无展开
  awards:['cannes'],                  // 奖项默认选戛纳(进奖项时生效)
  yearRange:[2020,2025],              // 默认最近5年
  list:'cc',
  sort:'new',
  favs:{},                            // 收藏：title_cn -> true
  pendingRemove:{},                   // 红心模式下刚取消、暂留到下次进入前
  awardTouched:false,                 // 奖项是否被点过(初始未处理)
  empty:null                          // 当前空状态榜单key(无数据项)
};

var grid=document.getElementById('grid');

/* ---- 取数据 ---- */
function awardArr(){
  // 候选：在年份范围内、得过"某个已选奖"的片，记录它得过哪些已选奖
  var cand={};
  TWMS_DATA.forEach(function(d){
    var k=AWKEY[d.award_key];
    if(state.awards.indexOf(k)<0)return;
    if(d.type!=='获奖')return;
    var y=+d.year;
    if(y<state.yearRange[0]||y>state.yearRange[1])return;
    if(!cand[d.tmdb_id]){cand[d.tmdb_id]={rec:AWARD_INDEX[d.tmdb_id],hit:{}};}
    cand[d.tmdb_id].hit[k]=true;
  });
  // 多选=交集(AND)：必须命中所有已选奖；单选=该奖全部
  var need=state.awards.length;
  return Object.values(cand).filter(function(c){
    return Object.keys(c.hit).length>=need;   // 命中数≥已选奖数 → 全中
  }).map(function(c){
    var rec=c.rec;
    return {title:rec.info.title_cn,year:+rec.info.year,poster:rec.info.poster,
      dir:(rec.info.directors||[]).join('·'),
      awardKeys:state.awards.filter(function(k){return c.hit[k];})};
  });
}
function listArr(){
  return CC_DATA.map(function(d){
    var y=d.is_boxset?null:((''+d.year).match(/\d{4}/)?+(''+d.year).match(/\d{4}/)[0]:null);
    return {title:d.title_cn,year:y,poster:d.poster,dir:d.director||'',
      awardKeys:CN2AWARDS[d.title_cn]||[]};
  });
}
function a24Arr(){
  return A24_DATA.map(function(d){
    return {title:d.title_cn,year:d.year,poster:d.poster,dir:d.director||'',
      box:d.box,rank:d.rank,is_new:d.is_new,
      awardKeys:CN2AWARDS[d.title_cn]||[]};
  });
}
function favArr(){
  // 跨池：奖项库 + CC库 中所有被收藏的；外加本次"刚取消但暂留"的
  var out=[],seen={};
  function keep(t){return state.favs[t]||state.pendingRemove[t];}
  Object.values(AWARD_INDEX).forEach(function(rec){
    var t=rec.info.title_cn;
    if(keep(t)&&!seen[t]){
      seen[t]=1;
      out.push({title:t,year:+rec.info.year,poster:rec.info.poster,
        dir:(rec.info.directors||[]).join('·'),
        awardKeys:CN2AWARDS[t]||[]});
    }
  });
  CC_DATA.forEach(function(d){
    var t=d.title_cn;
    if(keep(t)&&!seen[t]){
      seen[t]=1;var y=d.is_boxset?null:((''+d.year).match(/\d{4}/)?+(''+d.year).match(/\d{4}/)[0]:null);
      out.push({title:t,year:y,poster:d.poster,dir:d.director||'',
        awardKeys:CN2AWARDS[t]||[]});
    }
  });
  return out;
}

var EMPTY_NAME={a24:'A24 年度话题榜',cahiers:'电影手册年度十佳',sightsound:'视与听年度十佳',fanpai:'反派影评',xhs:'小红书话题榜',venice:'威尼斯金狮',berlin:'柏林金熊',bluedragon:'韩国青龙奖'};

function render(){
  // 空状态（点了无数据项）
  if(state.empty){
    var nm=EMPTY_NAME[state.empty]||'该榜单';
    document.getElementById('wallTitle').innerHTML='<span class="front">'+nm+'</span>';
    document.getElementById('wallSub').textContent='数据整理中';
    document.querySelector('.sort-row').style.visibility='hidden';
    grid.innerHTML='<div class="empty-stage">'+
      '<div class="empty-card"><div class="empty-ph"></div></div>'+
      '<div class="empty-text">该榜单数据整理中，敬请期待</div></div>';
    return;
  }
  document.querySelector('.sort-row').style.visibility='';

  var isA24=(state.mode==='list' && state.list==='a24');
  var arr;
  if(state.mode==='award')arr=awardArr();
  else if(state.mode==='list')arr=(state.list==='a24'?a24Arr():listArr());
  else arr=favArr();

  // A24 默认按票房排名(rank)；其余按年份
  if(isA24){
    arr.sort(function(a,b){return state.sort==='new'?a.rank-b.rank:b.rank-a.rank;});
  }else{
    arr.sort(function(a,b){return state.sort==='new'?b.year-a.year:a.year-b.year;});
  }

  // 海报框比例：CC榜单4:5 / A24和奖项2:3 / 红心2:3
  grid.classList.remove('ratio-cc','ratio-award','ratio-fav');
  grid.classList.add((state.mode==='list'&&!isA24)?'ratio-cc':'ratio-award');

  // 标题 + 副属性行
  var wt=document.getElementById('wallTitle');
  var ws=document.getElementById('wallSub');
  if(state.mode==='award'){
    var names=state.awards.map(function(k){return AW[k];}).join(' + ');
    var suffix=(state.awards.length===1?'获奖电影':'最佳影片');  // 交集→最佳影片
    wt.innerHTML='<span class="front">'+names+'</span> <span class="back">'+suffix+'</span>';
    ws.textContent=arr.length+'部 · '+state.yearRange[0]+'–'+state.yearRange[1];
  }else if(isA24){
    wt.innerHTML='<span class="front">A24</span> <span class="back">年度票房榜</span>';
    ws.innerHTML='10部 · 全球票房 · <span style="color:var(--title-front)">新王登基</span>';
  }else if(state.mode==='list'){
    wt.innerHTML='<span class="front">CC 标准收藏</span> <span class="back">年度畅销榜</span>';
    ws.textContent=arr.length+'部 · 今年';
  }else{
    wt.innerHTML='<span class="front">我的红心</span> <span class="back">收藏夹</span>';
    ws.textContent=arr.length+'部';
  }

  // 获奖角标显示规则：
  // - CC/A24/红心：显示(标注这片得过哪些奖)
  // - 奖项单选：不显示(全是同一个奖，重复废话)
  // - 奖项多选(交集)：显示(让观众分清每部到底得了哪几个奖)
  var showTags = (state.mode!=='award') || (state.awards.length>1);

  // 网格
  grid.innerHTML=arr.map(function(f){
    var p=f.poster?'<img src="'+f.poster+'" loading="lazy" onerror="this.onerror=null;this.outerHTML=\'<div class=ph>'+f.title+'</div>\'">':'<div class="ph">'+f.title+'</div>';
    var faved=!!state.favs[f.title];
    var heart='<div class="heart '+(faved?'faved':'')+'" data-title="'+encodeURIComponent(f.title)+'">'+(faved?HEART_FAV:HEART_UNFAV)+'</div>';
    var tags=(showTags&&f.awardKeys&&f.awardKeys.length)?
      '<div class="card-tags">'+f.awardKeys.map(function(k){return '<span class="mini-tag '+k+'">'+AWNAME[k]+'</span>';}).join('')+'</div>':'';
    // A24：排名角标 + 票房
    var rankBadge=isA24?'<div class="rank-badge'+(f.is_new?' is-new':'')+'">'+f.rank+'</div>':'';
    var boxLine=isA24?'<div class="card-box">'+f.box+'</div>':'';
    return '<div class="card"><div class="poster">'+rankBadge+p+heart+'</div>'+
      '<div class="card-title">'+f.title+(f.year?'<span class="yr">'+f.year+'</span>':'')+'</div>'+
      '<div class="card-dir">'+f.dir+'</div>'+boxLine+tags+'</div>';
  }).join('');
}

/* ===== 展开/选中分离模型 =====
   - state.open{list,award}: 展开状态，可多开，纯视觉
   - state.mode: 全局唯一选中内容(list/award/fav)
   - 选中跨模块互斥：点任一具体项，其余模块选中全部清空
*/

// 统一刷新左栏UI（展开 + 选中高亮）
function syncUI(){
  // 展开态：榜单/奖项按 state.open；红心是入口无展开
  document.querySelectorAll('.sec.acc:not(.entry)').forEach(function(sec){
    sec.classList.toggle('open', !!state.open[sec.dataset.mod]);
  });
  // 榜单 tag 选中：仅当 mode===list 且非空状态，高亮当前 list
  document.querySelectorAll('#listSec .tag[data-list]').forEach(function(t){
    t.classList.toggle('on', state.mode==='list' && !state.empty && !t.dataset.empty && t.dataset.list===state.list);
  });
  // 奖项 tag 选中：仅当 mode===award 且非空状态，高亮已选(可多选)
  document.querySelectorAll('#awardSec .tag[data-aw]').forEach(function(t){
    t.classList.toggle('on', state.mode==='award' && !state.empty && !t.dataset.empty && state.awards.indexOf(t.dataset.aw)>=0);
  });
  // 红心入口选中态
  document.getElementById('favSec').classList.toggle('sel', state.mode==='fav' && !state.empty);
  // 年份滑块仅奖项选中时可用
  document.getElementById('yearBlock').classList.toggle('disabled', state.mode!=='award');
}

// 切换右侧内容(全局唯一选中)
function selectContent(m){
  if(m==='fav' && state.mode!=='fav'){ state.pendingRemove={}; }
  state.mode=m;
  state.empty=null;
  syncUI();
  render();
}

// 纯展开/收起(不改选中内容)
function toggleOpen(mod){
  state.open[mod]=!state.open[mod];
  syncUI();
}

/* ---- 点无数据项 → 空状态 ---- */
function showEmpty(key){
  state.empty=key;
  syncUI();
  render();
}

/* ---- 榜单/奖项标题：点击只展开/收起，不切内容 ---- */
document.querySelectorAll('.acc-head[data-toggle]').forEach(function(h){
  h.addEventListener('click',function(){ toggleOpen(h.dataset.toggle); });
});
/* ---- 红心标题(入口)：点击即选中显示收藏夹 ---- */
document.querySelector('.acc-head[data-select="fav"]').addEventListener('click',function(){
  selectContent('fav');
});

/* ---- 奖项 tag 点击：选中(多选)，跨模块互斥 ---- */
document.querySelectorAll('#awardSec .tag[data-aw]').forEach(function(t){
  t.addEventListener('click',function(e){
    e.stopPropagation();
    if(t.dataset.empty){ showEmpty(t.dataset.aw); return; }
    state.awardTouched=true;
    var k=t.dataset.aw;
    if(state.mode!=='award' || state.empty){
      // 从别的模式/空状态切入奖项：本次点击的项成为唯一选中
      state.awards=[k];
      selectContent('award');
      return;
    }
    // 已在奖项模式：多选增删
    var i=state.awards.indexOf(k);
    if(i>=0){ if(state.awards.length>1)state.awards.splice(i,1); }
    else state.awards.push(k);
    selectContent('award');
  });
});
/* ---- 榜单 tag 点击：单选，跨模块互斥 ---- */
document.querySelectorAll('#listSec .tag[data-list]').forEach(function(t){
  t.addEventListener('click',function(e){
    e.stopPropagation();
    if(t.dataset.empty){ showEmpty(t.dataset.list); return; }
    state.list=t.dataset.list;
    selectContent('list');
  });
});
/* ---- 排序 ---- */
document.getElementById('sNew').onclick=function(){state.sort='new';this.classList.add('on');document.getElementById('sOld').classList.remove('on');render();};
document.getElementById('sOld').onclick=function(){state.sort='old';this.classList.add('on');document.getElementById('sNew').classList.remove('on');render();};

/* ---- 红心点击(事件委托) ---- */
grid.addEventListener('click',function(e){
  var h=e.target.closest('.heart');if(!h)return;
  var title=decodeURIComponent(h.dataset.title);
  var nowFaved=!!state.favs[title];
  if(nowFaved){
    delete state.favs[title];
    // 红心模式下：暂留在收藏页，右上角红心变未标记，下次进入才消失
    if(state.mode==='fav'){ state.pendingRemove[title]=true; }
  }else{
    state.favs[title]=true;
    delete state.pendingRemove[title];
  }
  // 统一只切图标，不移除卡片（红心模式靠 pendingRemove 暂留）
  var faved=!!state.favs[title];
  h.classList.toggle('faved',faved);
  h.innerHTML=faved?HEART_FAV:HEART_UNFAV;
});

/* ===== 年份双滑块 ===== */
(function(){
  var slider=document.getElementById('slider'),fill=document.getElementById('trackFill'),
      hMin=document.getElementById('hMin'),hMax=document.getElementById('hMax'),val=document.getElementById('yearVal');
  function pct(y){return (y-YEAR_MIN)/(YEAR_MAX-YEAR_MIN)*100;}
  function update(){
    var a=state.yearRange[0],b=state.yearRange[1];
    hMin.style.left=pct(a)+'%';hMax.style.left=pct(b)+'%';
    fill.style.left=pct(a)+'%';fill.style.width=(pct(b)-pct(a))+'%';
    val.textContent=a+' – '+b;
  }
  function drag(handle,isMin){
    handle.addEventListener('mousedown',function(e){
      e.preventDefault();
      var rect=slider.getBoundingClientRect();
      function move(ev){
        var p=Math.min(1,Math.max(0,(ev.clientX-rect.left)/rect.width));
        var y=Math.round(YEAR_MIN+p*(YEAR_MAX-YEAR_MIN));
        if(isMin){ y=Math.min(y,state.yearRange[1]); state.yearRange[0]=y; }
        else { y=Math.max(y,state.yearRange[0]); state.yearRange[1]=y; }
        update();
        if(state.mode==='award')render();
      }
      function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}
      document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    });
  }
  drag(hMin,true);drag(hMax,false);
  update();
})();

/* ===== 初始：榜单展开+CC选中，奖项收起，红心未选 ===== */
selectContent('list');
syncUI();
</script>
